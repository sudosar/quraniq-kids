name: Build and Deploy QuranIQ Kids to VM
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: VM Terabix
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build production bundle
        run: VITE_BASE_URL=/ pnpm exec vite build
        env:
          VITE_BASE_URL: /
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          port: ${{ secrets.VM_PORT }}
          script_stop: true
          script: |
            rm -rf /var/www/quraniq-kids/*
            echo "Cleared old deployment"
      - name: Copy build files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          port: ${{ secrets.VM_PORT }}
          source: "dist/public/*"
          target: "/var/www/quraniq-kids"
          strip_components: 2
          overwrite: true
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          port: ${{ secrets.VM_PORT }}
          script: |
            if [ -f /var/www/quraniq-kids/index.html ]; then
              echo "✅ Deployment verified - index.html exists"
              ls -la /var/www/quraniq-kids/
            else
              echo "❌ Deployment FAILED - index.html not found!"
              ls -la /var/www/quraniq-kids/
              exit 1
            fi
            echo "Deployed QuranIQ Kids at $(date)"
