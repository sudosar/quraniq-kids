name: Build and Deploy QuranIQ Kids to VM

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: VITE_BASE_URL=/ pnpm exec vite build --outDir dist/public
        working-directory: client

      - name: Create deployment tarball
        run: tar czf /tmp/quraniq-kids-deploy.tar.gz -C client/dist/public .

      - name: Deploy to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          port: ${{ secrets.VM_PORT }}
          source: "/tmp/quraniq-kids-deploy.tar.gz"
          target: "/tmp/"
          strip_components: 0

      - name: Extract and deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          port: ${{ secrets.VM_PORT }}
          script: |
            rm -rf /var/www/quraniq-kids/*
            tar xzf /tmp/quraniq-kids-deploy.tar.gz -C /var/www/quraniq-kids/
            rm -f /tmp/quraniq-kids-deploy.tar.gz
            echo "Deployed QuranIQ Kids at $(date)"
